<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>HPTU Result Portal</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        line-height: 1.6;
      }
      .header {
        background: #f58220;
        color: white;
        text-align: center;
        padding: 30px 20px;
      }
      .logo {
        width: 90px;
        display: block;
        margin: auto;
        margin-bottom: 10px;
      }
      .nav {
        background: #333;
        color: white;
        text-align: center;
        padding: 15px;
        font-size: 16px;
      }
      .container {
        max-width: 900px;
        width: 90%;
        margin: 60px auto;
        background: white;
        padding: 50px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.15);
        border-radius: 12px;
      }
      input,
      select {
        width: 100%;
        padding: 18px;
        margin: 20px 0;
        font-size: 18px;
        border: 2px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box;
      }
      button {
        background: #f58220;
        color: white;
        border: none;
        padding: 18px 40px;
        font-size: 18px;
        cursor: pointer;
        border-radius: 8px;
        width: 100%;
        box-sizing: border-box;
      }
      button:hover {
        background: #d96a10;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin: 30px 0;
      }
      table,
      th,
      td {
        border: 1px solid #ccc;
      }
      th {
        background: #f58220;
        color: white;
      }
      th,
      td {
        padding: 15px 12px;
        text-align: center;
        font-size: 15px;
      }
      .pass {
        color: green;
        font-weight: bold;
      }
      .fail {
        color: red;
        font-weight: bold;
      }
      .footer {
        background: #222;
        color: white;
        text-align: center;
        padding: 20px;
        margin-top: 40px;
        font-size: 14px;
      }
      #result {
        margin-top: 30px;
      }
      #result h3 {
        margin: 0 0 20px 0;
        color: #333;
      }
      #result p {
        margin: 0 0 15px 0;
        font-size: 16px;
      }
      #result table {
        margin-bottom: 20px;
      }

      @media (max-width: 768px) {
        .container {
          width: 95%;
          padding: 30px 20px;
          margin: 30px auto;
        }
        input,
        button {
          font-size: 16px;
          padding: 16px;
        }
        th,
        td {
          padding: 10px 8px;
          font-size: 14px;
        }
        .header {
          padding: 20px 15px;
        }
        .logo {
          width: 70px;
        }
        .nav {
          padding: 12px;
          font-size: 15px;
        }
        table {
          font-size: 13px;
        }
      }
      @media (max-width: 480px) {
        .container {
          width: 98%;
          padding: 20px 15px;
        }
        th,
        td {
          padding: 8px 5px;
          font-size: 12px;
        }
      }
    </style>
  </head>

      // Subjects with codes
      const subjects = [
        "Data Structures & Algorithms (DSA)",
        "Data Structures Lab",
        "Python Programming",
        "Python Programming Lab",
        "Digital System Design",
        "Digital System Design Lab",
        "Computer Organization & Architecture (COA)",
        "Indian Knowledge System",
        "Engineering Economics",
        "Probability Theory & Statistics",
      ];

      const subjectCodes = {
        "Data Structures & Algorithms (DSA)": "CSPC-311",
        "Data Structures Lab": "CSPC-311P",
        "Python Programming": "CSPC-312",
        "Python Programming Lab": "CSPC-312P",
        "Digital System Design": "ECEPC-312",
        "Digital System Design Lab": "ECEPC-312P",
        "Computer Organization & Architecture (COA)": "CSPC-313",
        "Indian Knowledge System": "IKS-311",
        "Engineering Economics": "HS-311",
        "Probability Theory & Statistics": "MAFC-311",
      };

      // Add marks dynamically
      students.forEach((s) => {
        s.marks = {};
        subjects.forEach((sub) => {
          s.marks[sub] = getRandomGradePoint();
        });
      });

      // No dropdown population needed for input field

      // Function to get grade point and letter grade
      function getRandomGradePoint() {
        const points = [10, 9, 8, 7, 6, 5, 0];
        return points[Math.floor(Math.random() * points.length)];
      }

      function getGrade(point) {
        if (point == 10) return { point: 10, letter: "O" };
        if (point == 9) return { point: 9, letter: "A+" };
        if (point == 8) return { point: 8, letter: "A" };
        if (point == 7) return { point: 7, letter: "B+" };
        if (point == 6) return { point: 6, letter: "B" };
        if (point == 5) return { point: 5, letter: "C" };
        return { point: 0, letter: "F" };
      }

      // Search Function
      function search() {
        let roll = document.getElementById("roll").value.toLowerCase();
        let name = document.getElementById("name").value.toLowerCase();
        let student = null;

        for (let s of students) {
          if (
            (s.roll.toLowerCase() == roll && roll != "") ||
            (s.name.toLowerCase() == name && name != "")
          ) {
            student = s;
            break;
          }
        }

        if (!student) {
          document.getElementById("result").innerHTML =
            "<p style='color:red'>Result Not Found</p>";
          return;
        }

        let m = student.marks;
        let totalMarks = 0;
        let totalGradePoints = 0;
        let failedSubjects = [];
        let table = `<table><tr><th>Subject</th><th>Subject Code</th><th>Marks</th><th>Grade</th></tr>`;
        for (let sub in m) {
          let point = m[sub];
          let grade = getGrade(point);
          table += `<tr><td>${sub}</td><td>${subjectCodes[sub]}</td><td>${point}</td><td>${grade.letter}</td></tr>`;
          totalMarks += point;
          totalGradePoints += grade.point;
          if (point < 5) failedSubjects.push(subjectCodes[sub]);
        }
        table += `</table>`;

        let sgpa = (totalGradePoints / subjects.length).toFixed(2);
        let resultText =
          failedSubjects.length > 0
            ? `<b>Result:</b> ${failedSubjects.join(", ")}`
            : "<b>Result: PASS</b>";

        document.getElementById("result").innerHTML = `
    <h3>Student Details</h3>
    <p><b>Roll Number:</b> ${student.roll}</p>
    <p><b>Name:</b> ${student.name}</p>
    <p><b>Father's Name:</b> ${student.father}</p>
    <p><b>Branch:</b> ${student.branch}</p>
    ${table}
    <p><b>SGPA:</b> ${sgpa}</p>
    <p><b>${resultText}</b></p>
    `;
      }
